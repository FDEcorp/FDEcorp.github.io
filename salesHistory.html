<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FDE - Sale By Item</title>
    <script type="module" src="dbconfig.js"></script>
    <script type="module" src="getTempKey.js"></script>
    <script type="module" src="getSaleHistory.js"></script>
    <script type="module" src="../headerRender.js"></script>
    <link rel="stylesheet" href="main.css">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>

    <script type="text/javascript"></script>
    <script>
        if (localStorage.getItem('business') == null || localStorage.getItem('business') == undefined) {
            location.href = 'Index.html'
        }
    </script>
    <style>
        body {
            height: 180vh;
            background-color: #fff;
        }

        html {
            background-color: #fff;
        }
    </style>
</head>

<body>
    <header id="header">
        <h1>
            <img src="../fdeicon.png" height="24px" alt=""> FDE: <span id="business"></span>
        </h1>
        <script>
            document.getElementById('business').innerText = localStorage.getItem('business')
        </script>
        <div id="logout" onclick="location.href = 'index.html'">Cerrar Sesión</div>
    </header>
    <section class="subnav">
        <div style="max-width: 150px; flex: 1; padding: 10px; border-radius: 8px;" onclick="location.href='pos.html'">
            POS</div>
        <div style="flex-grow: 1; justify-content: center;">
            <h3 style="margin: 0px; padding: 8px;">Historial de Ventas</h3>
        </div>
        <div style="flex:1"></div>
    </section>

    <div class="main-cont" id="main-cont">

        <div
            style="display: flex; flex-direction: row; align-items: center; justify-content: center; flex-wrap: wrap; padding-inline: 0px; max-width: 350px; margin-inline: auto; gap: 10px;">
            <select type="text" name="" id="item-select" style="flex: 1; padding: 8px; border-radius: 8px;">
                <option value="">Selecciona un Producto</option>
            </select>

            <div
                style="display: flex; flex-direction: column; margin: 0; padding: 0; justify-content: right; text-align: right; width: 90px;">
                <button id="search" style="width: 100%; margin-top: 0px;">Buscar</button>
            </div>
        </div>

        <div
            style="display: flex; flex-direction: row; align-items: center; justify-content: center; flex-wrap: wrap; padding-inline: 0px; max-width: 360px; margin-inline: 10px; gap: 30px;">

            <div
                style="display: flex; flex-direction: column; margin: 0; padding: 0; justify-content: left; text-align: left; flex: 1; max-width: 40%;">
                <div style="flex: 1; text-align: left; color: gray; font-size: 12px;"><span>Desde:</span></div>
                <div style="flex: 1;">
                    <input type="date" id="from-date" class="date-selector" style="flex: 1; width: 100%;">
                </div>
            </div>

            <div
                style="display: flex; flex-direction: column; margin: 0; padding: 0; justify-content: right; text-align: left; flex: 1; max-width: 40%;">
                <div style="text-align: left; color: gray; font-size: 12px;"><span>Hasta</span></div>
                <div>
                    <input type="date" id="to-date" class="date-selector" style="flex: 1; width: 100%;">
                </div>
            </div>


        </div>
        <div
            style="margin-top: 10px; padding-inline: 20px; text-align: center; color: rgb(0, 0, 0); font-size: 16px; text-align: left;">
            <b>Venta en periodo:</b><span id="delta"></span>
        </div>
        <div id="chart_div" style="width: 100%; height: 300px; "></div>

    </div>

</body>

</html>
